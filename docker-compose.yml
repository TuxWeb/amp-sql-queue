services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: amp_queue
      POSTGRES_USER: amp_queue
      POSTGRES_PASSWORD: amp_queue
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amp_queue -d amp_queue"]
      interval: 5s
      timeout: 5s
      retries: 20

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: amp_queue
      MYSQL_USER: amp_queue
      MYSQL_PASSWORD: amp_queue
      MYSQL_ROOT_PASSWORD: amp_queue_root
    ports:
      - "3306:3306"
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uamp_queue", "-pamp_queue"]
      interval: 5s
      timeout: 5s
      retries: 30
